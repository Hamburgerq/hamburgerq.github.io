<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeafyLog - Plant Watering Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #b8e0c3;
            overflow-x: hidden;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 1px;
            background-color: #e5e7eb;
            border: 1px solid #e5e7eb;
        }

        .calendar-day {
            min-height: 100px;
            background-color: white;
            padding: 0.5rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .calendar-day:not(.is-future):hover {
            background-color: #f0fdf4;
        }

        .calendar-day.other-month {
            background-color: #f3f4f6;
            color: #9ca3af;
            cursor: default;
            pointer-events: none;
        }

        .calendar-day.is-future {
            background-color: #fafafa;
            color: #d1d5db;
            cursor: not-allowed;
        }

        .calendar-day.selected-date {
            background-color: #dcfce7;
            outline: 2px solid #10b981;
            outline-offset: -2px;
            z-index: 10;
        }

        .watering-icon {
            font-size: 10px;
            width: 14px;
            height: 14px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1px;
            color: white;
            font-weight: bold;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        #plantList {
            overflow-y: auto;
            padding-right: 4px;
        }

        @media (max-width: 1023px) {
            #plantList { max-height: 40vh; }
        }

        @media (min-width: 1024px) {
            #plantList { max-height: 60vh; }
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .color-swatch:hover {
            transform: scale(1.1);
        }

        .color-swatch.active {
            border-color: #374151;
            box-shadow: 0 0 0 2px white inset;
        }

        #globalActionPopup {
            position: fixed;
            display: none;
            flex-direction: column;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            z-index: 10000;
            overflow: hidden;
            border: 1px solid #e5e7eb;
            min-width: 220px;
            transform: translate(-50%, -100%);
            margin-top: -12px;
            pointer-events: auto;
        }

        #globalActionPopup.active { display: flex; }

        .check-mark {
            color: #10b981;
            font-weight: bold;
        }

        /* Prevent text selection and zoom issues during fast navigation */
        .no-select {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            touch-action: manipulation; 
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-emerald-800">LeafyLog 🌿</h1>
                <p class="text-emerald-600">Toggle multiple watering times for a single day.</p>
            </div>
            <div class="flex flex-wrap gap-2">
                <input type="file" id="excelInput" accept=".xlsx, .xls" class="hidden" onchange="handleImport(event)">
                <button onclick="document.getElementById('excelInput').click()" class="bg-white hover:bg-gray-200 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-full font-semibold shadow-sm transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
                    </svg>
                    Import
                </button>
                <button onclick="exportToExcel()" class="bg-white hover:bg-gray-200 text-emerald-700 border border-emerald-200 px-4 py-2 rounded-full font-semibold shadow-sm transition-all flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
                    </svg>
                    Export
                </button>
                <button onclick="openAddModal()" class="bg-emerald-600 hover:bg-emerald-800 text-white px-6 py-2 rounded-full font-semibold shadow-lg transition-all flex items-center gap-2">
                    <span>+</span> Add Plant
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
            <div class="lg:col-span-1 glass-card rounded-2xl p-6 shadow-sm sticky top-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-gray-800">My Plants</h2>
                    <button onclick="toggleModal('manageModal', true); renderManageList();" class="text-base font-semibold text-white bg-emerald-600 hover:bg-emerald-800 px-3 py-1 rounded-full transition-colors">
                        Manage
                    </button>
                </div>
                <div id="plantList" class="space-y-3"></div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="glass-card rounded-2xl p-4 shadow-sm">
                    <div class="flex flex-wrap justify-between items-center mb-6 gap-4">
                        <h2 id="currentMonthYear" class="text-2xl font-bold text-gray-800">Month Year</h2>
                        <div class="flex items-center gap-2">
                            <button id="todayBtn" class="bg-emerald-50 text-emerald-700 border border-emerald-200 hover:bg-emerald-100 px-4 py-2 rounded-full font-bold text-sm transition-all shadow-sm">Today</button>
                            
                            <div class="flex gap-2">
                                <button id="prevBtn" class="no-select text-2xl font-bold w-12 h-12 flex items-center justify-center bg-white border border-emerald-200 hover:bg-emerald-600 hover:text-white rounded-full transition-colors shadow-sm">←</button>
                                <button id="nextBtn" class="no-select text-2xl font-bold w-12 h-12 flex items-center justify-center bg-white border border-emerald-200 hover:bg-emerald-600 hover:text-white rounded-full transition-colors shadow-sm">→</button>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-7 mb-2 text-center text-xs font-bold uppercase">
                        <div class="text-red-600">Sun</div>
                        <div class="text-gray-400">Mon</div>
                        <div class="text-gray-400">Tue</div>
                        <div class="text-gray-400">Wed</div>
                        <div class="text-gray-400">Thu</div>
                        <div class="text-gray-400">Fri</div>
                        <div class="text-red-600">Sat</div>
                    </div>
                    <div id="calendarGrid" class="calendar-grid rounded-lg overflow-hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Global Action Popup -->
    <div id="globalActionPopup">
        <div class="flex items-stretch border-b border-gray-100 bg-white">
            <button id="btnMorning" class="flex-1 px-5 py-3 hover:bg-emerald-50 text-emerald-800 font-semibold flex items-center justify-between gap-3 transition-colors">
                <div class="flex items-center gap-3"><span>🌅</span> Morning</div>
                <span id="checkMorning" class="check-mark hidden">✓</span>
            </button>
            <button id="btnNoteMorning" class="hidden px-4 hover:bg-emerald-50 text-gray-400 hover:text-emerald-600 transition-colors border-l border-gray-100 flex items-center justify-center text-lg outline-none" title="Add/Edit Note">📝</button>
        </div>
        <div class="flex items-stretch border-b border-gray-100 bg-white">
            <button id="btnAfternoon" class="flex-1 px-5 py-3 hover:bg-emerald-50 text-emerald-800 font-semibold flex items-center justify-between gap-3 transition-colors">
                <div class="flex items-center gap-3"><span>🌇</span> Afternoon</div>
                <span id="checkAfternoon" class="check-mark hidden">✓</span>
            </button>
            <button id="btnNoteAfternoon" class="hidden px-4 hover:bg-emerald-50 text-gray-400 hover:text-emerald-600 transition-colors border-l border-gray-100 flex items-center justify-center text-lg outline-none" title="Add/Edit Note">📝</button>
        </div>
        <button id="btnClearAll" class="w-full px-5 py-3 hover:bg-red-50 text-red-600 font-semibold flex items-center gap-3 transition-colors bg-white">
            <span>❌</span> Clear Day
        </button>
    </div>

    <!-- Note Modal -->
    <div id="noteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[105]">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 id="noteModalTitle" class="text-xl font-bold text-gray-800 mb-4">Watering Note</h3>
            <textarea id="wateringNoteText" rows="4" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none resize-none" placeholder="Add some notes here (e.g., added fertilizer, pruned dead leaves...)"></textarea>
            <div class="flex gap-3 mt-6">
                <button type="button" onclick="closeNoteModal()" class="flex-1 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">Cancel</button>
                <button type="button" onclick="saveNote()" class="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium shadow-md transition-colors">Save Note</button>
            </div>
        </div>
    </div>

    <!-- Plant Entry Modal -->
    <div id="plantModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <h3 id="modalTitle" class="text-2xl font-bold mb-4">Add New Plant</h3>
            <form id="plantForm" class="space-y-6">
                <input type="hidden" id="editIndex" value="">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Plant Name</label>
                    <input type="text" id="plantName" required placeholder="e.g. Monstera Deliciosa" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-3">Tag Color</label>
                    <div id="colorPalette" class="flex flex-wrap gap-3 mb-4">
                        <!-- Swatches injected by JS -->
                    </div>
                    <div class="flex items-center gap-3 pt-2 border-t">
                        <label class="text-xs text-gray-500">Custom:</label>
                        <input type="color" id="plantColor" value="#10b981" class="w-10 h-10 border rounded-lg cursor-pointer bg-transparent">
                        <span id="hexLabel" class="text-xs font-mono text-gray-400 uppercase">#10B981</span>
                    </div>
                </div>
                <div class="flex gap-3 mt-8">
                    <button type="button" onclick="closePlantModal()" class="flex-1 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg font-medium transition-colors">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium shadow-md transition-colors">Save</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Manage Collection Modal -->
    <div id="manageModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-[90]">
        <div class="bg-white rounded-2xl p-8 max-w-2xl w-full shadow-2xl max-h-[80vh] flex flex-col">
            <h3 class="text-2xl font-bold mb-6">Manage Collection</h3>
            <div id="manageList" class="space-y-3 overflow-y-auto pr-2 pb-4"></div>
            <div class="mt-4 pt-4 border-t border-gray-100 flex justify-end">
                <button onclick="toggleModal('manageModal', false)" class="px-6 py-2 bg-gray-800 text-white rounded-lg font-medium hover:bg-black transition-colors">Done</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 bg-gray-900/95 text-white px-8 py-4 rounded-2xl shadow-2xl font-bold text-lg text-center opacity-0 invisible scale-90 transition-all duration-300 z-[9999] pointer-events-none"></div>

    <script>
        let plants = JSON.parse(localStorage.getItem('leafy_plants')) || [];
        let currentDate = new Date();
        let selectedDateStr = null;
        let draggedPlantIndex = null;
        let editingNoteData = { index: null, time: null };

        const defaultPalette = [
            '#10b981', '#059669', '#065f46', 
            '#3b82f6', '#1d4ed8', '#1e3a8a', 
            '#f59e0b', '#d97706', '#92400e', 
            '#ec4899', '#be185d', '#831843', 
            '#8b5cf6', '#6d28d9', '#4c1d95', 
            '#f43f5e', '#e11d48', '#9f1239' 
        ];

        const plantListEl = document.getElementById('plantList');
        const manageListEl = document.getElementById('manageList');
        const calendarGridEl = document.getElementById('calendarGrid');
        const monthYearEl = document.getElementById('currentMonthYear');
        const plantForm = document.getElementById('plantForm');
        const toastEl = document.getElementById('toast');
        const globalPopup = document.getElementById('globalActionPopup');
        const colorPaletteEl = document.getElementById('colorPalette');
        const colorInput = document.getElementById('plantColor');
        const hexLabel = document.getElementById('hexLabel');

        let scrollTimer = null;
        let scrollInterval = null;

        function init() {
            goToToday();
            renderPlants();
            renderCalendar();
            setupColorPalette();
            setupNavigationHandlers();
            
            window.addEventListener('scroll', closeGlobalPopup);
            plantListEl.addEventListener('scroll', closeGlobalPopup);
            window.addEventListener('resize', closeGlobalPopup);
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.plant-card') && !e.target.closest('#globalActionPopup')) {
                    closeGlobalPopup();
                }
            });

            colorInput.oninput = (e) => updateColorSelection(e.target.value, true);

            plantForm.onsubmit = (e) => {
                e.preventDefault();
                const name = document.getElementById('plantName').value;
                const color = colorInput.value;
                const editIndex = document.getElementById('editIndex').value;

                if (editIndex !== "") {
                    plants[editIndex].name = name;
                    plants[editIndex].color = color;
                    showToast("Plant Updated!");
                } else {
                    plants.push({ name, color, wateringRecords: [] });
                    showToast("Plant Added!");
                }

                saveData();
                closePlantModal();
                renderPlants();
                renderCalendar();
                renderManageList();
            };

            document.getElementById('todayBtn').onclick = () => {
                goToToday();
                showToast("Jumped to Today");
            };
        }

        function goToToday() {
            const today = new Date();
            currentDate = new Date(today.getFullYear(), today.getMonth(), 1);
            selectedDateStr = getFormattedDate(today);
            renderCalendar();
            renderPlants();
        }

        function setupNavigationHandlers() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');

            const startScroll = (dir) => {
                changeMonth(dir); 
                scrollTimer = setTimeout(() => {
                    scrollInterval = setInterval(() => {
                        changeMonth(dir);
                    }, 150); 
                }, 500); 
            };

            const stopScroll = () => {
                clearTimeout(scrollTimer);
                clearInterval(scrollInterval);
            };

            prevBtn.onmousedown = () => startScroll(-1);
            prevBtn.onmouseup = stopScroll;
            prevBtn.onmouseleave = stopScroll;
            prevBtn.ontouchstart = (e) => { e.preventDefault(); startScroll(-1); };
            prevBtn.ontouchend = stopScroll;

            nextBtn.onmousedown = () => startScroll(1);
            nextBtn.onmouseup = stopScroll;
            nextBtn.onmouseleave = stopScroll;
            nextBtn.ontouchstart = (e) => { e.preventDefault(); startScroll(1); };
            nextBtn.ontouchend = stopScroll;
        }

        function setupColorPalette() {
            colorPaletteEl.innerHTML = '';
            defaultPalette.forEach(color => {
                const swatch = document.createElement('div');
                swatch.className = 'color-swatch';
                swatch.style.backgroundColor = color;
                swatch.onclick = () => updateColorSelection(color);
                colorPaletteEl.appendChild(swatch);
            });
        }

        function updateColorSelection(color, fromPicker = false) {
            colorInput.value = color;
            hexLabel.innerText = color;
            
            const swatches = document.querySelectorAll('.color-swatch');
            swatches.forEach(s => {
                const bgColor = rgbToHex(s.style.backgroundColor);
                s.classList.toggle('active', bgColor.toLowerCase() === color.toLowerCase());
            });
        }

        function rgbToHex(rgb) {
            if (rgb.startsWith('#')) return rgb;
            const match = rgb.match(/\d+/g);
            if (!match || match.length < 3) return '#000000';
            const r = parseInt(match[0]).toString(16).padStart(2, '0');
            const g = parseInt(match[1]).toString(16).padStart(2, '0');
            const b = parseInt(match[2]).toString(16).padStart(2, '0');
            return `#${r}${g}${b}`;
        }

        function getFormattedDate(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function calculateAvgInterval(records) {
            if (!records || records.length < 2) return null;
            const uniqueDates = [...new Set(records.map(r => r.date))].sort();
            if (uniqueDates.length < 2) return null;
            const times = uniqueDates.map(d => new Date(d).getTime());
            let total = 0;
            for (let i = 1; i < times.length; i++) total += (times[i] - times[i - 1]);
            return (total / (times.length - 1) / (1000 * 60 * 60 * 24)).toFixed(1);
        }

        function renderPlants() {
            plantListEl.innerHTML = plants.length === 0 ? '<p class="text-gray-400 text-center py-4">No plants yet.</p>' : '';
            const isFuture = selectedDateStr > getFormattedDate(new Date());

            plants.forEach((plant, index) => {
                const records = (plant.wateringRecords || []).filter(r => r.date === selectedDateStr);
                const avg = calculateAvgInterval(plant.wateringRecords || []);
                
                const div = document.createElement('div');
                div.className = `plant-card relative flex items-center justify-between p-4 rounded-xl shadow-sm border-2 transition-all cursor-pointer bg-white ${isFuture ? 'opacity-50 grayscale cursor-not-allowed' : 'hover:border-emerald-400 border-transparent'}`;
                
                div.onclick = (e) => {
                    if (isFuture) return showToast("Cannot log future dates!");
                    e.stopPropagation();
                    openPopupAtElement(div, index, records);
                };
                
                let sessionText = '';
                if (records.length === 2) sessionText = 'Morning & Afternoon';
                else if (records.length === 1) sessionText = records[0].time.charAt(0).toUpperCase() + records[0].time.slice(1);

                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-3 h-10 rounded-full" style="background-color: ${plant.color}"></div>
                        <div>
                            <h4 class="font-bold text-gray-800">${plant.name}</h4>
                            ${avg ? `<span class="text-blue-600 text-[11px] font-bold uppercase tracking-wider">${avg}d avg</span>` : ''}
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1">
                        ${sessionText ? `<span class="text-emerald-600 text-sm font-bold">${sessionText}</span>` : ''}
                        <div class="flex gap-1.5">
                            ${records.map(r => `
                                <div class="flex items-center gap-0.5 ${r.note ? 'cursor-help' : ''}" title="${r.note ? r.note.replace(/"/g, '&quot;') : ''}">
                                    <span class="text-lg">${r.time === 'morning' ? '🌅' : '🌇'}</span>
                                    ${r.note ? '<span class="text-xs drop-shadow-sm text-gray-600 relative top-1">📝</span>' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                plantListEl.appendChild(div);
            });
        }

        function openPopupAtElement(el, index, currentRecords) {
            const rect = el.getBoundingClientRect();
            globalPopup.style.left = `${rect.left + (rect.width / 2)}px`;
            globalPopup.style.top = `${rect.top}px`;
            globalPopup.classList.add('active');

            updatePopupState(index);

            document.getElementById('btnMorning').onclick = (e) => { e.stopPropagation(); toggleWatering(index, 'morning'); };
            document.getElementById('btnAfternoon').onclick = (e) => { e.stopPropagation(); toggleWatering(index, 'afternoon'); };
            document.getElementById('btnClearAll').onclick = (e) => { e.stopPropagation(); toggleWatering(index, null); };

            document.getElementById('btnNoteMorning').onclick = (e) => { e.stopPropagation(); openNoteModal(index, 'morning'); };
            document.getElementById('btnNoteAfternoon').onclick = (e) => { e.stopPropagation(); openNoteModal(index, 'afternoon'); };
        }

        function updatePopupState(index) {
            const plant = plants[index];
            const currentRecords = (plant.wateringRecords || []).filter(r => r.date === selectedDateStr);
            
            const morningRec = currentRecords.find(r => r.time === 'morning');
            const afternoonRec = currentRecords.find(r => r.time === 'afternoon');

            document.getElementById('checkMorning').classList.toggle('hidden', !morningRec);
            document.getElementById('checkAfternoon').classList.toggle('hidden', !afternoonRec);
            
            const btnNoteMorning = document.getElementById('btnNoteMorning');
            const btnNoteAfternoon = document.getElementById('btnNoteAfternoon');

            btnNoteMorning.classList.toggle('hidden', !morningRec);
            btnNoteAfternoon.classList.toggle('hidden', !afternoonRec);

            // Highlight note button if a note actually exists
            if(morningRec && morningRec.note) {
                btnNoteMorning.classList.add('text-emerald-600', 'bg-emerald-50');
                btnNoteMorning.classList.remove('text-gray-400');
            } else {
                btnNoteMorning.classList.add('text-gray-400');
                btnNoteMorning.classList.remove('text-emerald-600', 'bg-emerald-50');
            }

            if(afternoonRec && afternoonRec.note) {
                btnNoteAfternoon.classList.add('text-emerald-600', 'bg-emerald-50');
                btnNoteAfternoon.classList.remove('text-gray-400');
            } else {
                btnNoteAfternoon.classList.add('text-gray-400');
                btnNoteAfternoon.classList.remove('text-emerald-600', 'bg-emerald-50');
            }
        }

        function toggleWatering(index, time) {
            const plant = plants[index];
            if (!plant.wateringRecords) plant.wateringRecords = [];

            if (time === null) {
                plant.wateringRecords = plant.wateringRecords.filter(r => r.date !== selectedDateStr);
                showToast("Records cleared.");
                closeGlobalPopup();
            } else {
                const exists = plant.wateringRecords.find(r => r.date === selectedDateStr && r.time === time);
                if (exists) {
                    plant.wateringRecords = plant.wateringRecords.filter(r => !(r.date === selectedDateStr && r.time === time));
                } else {
                    plant.wateringRecords.push({ date: selectedDateStr, time: time, note: "" });
                    showToast(`${time.charAt(0).toUpperCase() + time.slice(1)} logged!`);
                }
                updatePopupState(index);
            }

            saveData();
            renderPlants();
            renderCalendar();
        }

        function openNoteModal(index, time) {
            closeGlobalPopup();
            editingNoteData = { index, time };
            const plant = plants[index];
            const record = plant.wateringRecords.find(r => r.date === selectedDateStr && r.time === time);
            
            document.getElementById('noteModalTitle').innerText = `${time.charAt(0).toUpperCase() + time.slice(1)} Notes: ${plant.name}`;
            document.getElementById('wateringNoteText').value = record.note || '';
            
            toggleModal('noteModal', true);
            // Autofocus text area
            setTimeout(() => document.getElementById('wateringNoteText').focus(), 50);
        }

        function closeNoteModal() {
            toggleModal('noteModal', false);
            editingNoteData = { index: null, time: null };
        }

        function saveNote() {
            if (editingNoteData.index === null) return;
            const { index, time } = editingNoteData;
            const plant = plants[index];
            const record = plant.wateringRecords.find(r => r.date === selectedDateStr && r.time === time);
            
            if (record) {
                record.note = document.getElementById('wateringNoteText').value.trim();
                saveData();
                renderPlants();
                showToast("Note saved!");
            }
            closeNoteModal();
        }

        function closeGlobalPopup() {
            globalPopup.classList.remove('active');
        }

        function renderCalendar() {
            calendarGridEl.innerHTML = '';
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = getFormattedDate(new Date());
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            monthYearEl.innerText = `${year}. ${monthNames[month]}`;

            const first = new Date(year, month, 1).getDay();
            const daysCount = new Date(year, month + 1, 0).getDate();
            const prevDaysCount = new Date(year, month, 0).getDate();

            for (let i = first; i > 0; i--) createDayEl(prevDaysCount - i + 1, true);
            for (let i = 1; i <= daysCount; i++) {
                const d = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                createDayEl(i, false, d, d > today);
            }
            for (let i = 1; i <= (42 - (first + daysCount)); i++) createDayEl(i, true);
        }

        function createDayEl(num, isOther, dateStr = null, isFuture = false) {
            const div = document.createElement('div');
            div.className = `calendar-day ${isOther ? 'other-month' : ''} ${selectedDateStr === dateStr ? 'selected-date' : ''} ${isFuture ? 'is-future' : ''}`;
            if (!isOther && dateStr) div.onclick = () => selectDate(dateStr);
            div.innerHTML = `<span class="text-sm font-semibold block mb-1">${num}</span>`;
            
            if (dateStr) {
                const logs = document.createElement('div');
                logs.className = 'flex flex-wrap gap-0.5';
                plants.forEach(p => {
                    const dayRecs = (p.wateringRecords || []).filter(r => r.date === dateStr);
                    if (dayRecs.length > 0) {
                        const icon = document.createElement('div');
                        icon.className = 'watering-icon';
                        icon.style.backgroundColor = p.color;
                        icon.innerHTML = dayRecs.length > 1 ? '' : (dayRecs[0].time === 'morning' ? '☼' : '☾');
                        logs.appendChild(icon);
                    }
                });
                div.appendChild(logs);
            }
            calendarGridEl.appendChild(div);
        }

        function selectDate(d) { selectedDateStr = d; renderCalendar(); renderPlants(); }
        
        function changeMonth(dir) { 
            currentDate.setMonth(currentDate.getMonth() + dir); 
            renderCalendar(); 
            renderPlants();
        }

        function toggleModal(id, show) { document.getElementById(id).classList.toggle('hidden', !show); }
        
        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Add New Plant";
            document.getElementById('editIndex').value = "";
            document.getElementById('plantName').value = "";
            updateColorSelection('#10b981');
            toggleModal('plantModal', true);
        }

        function closePlantModal() { 
            toggleModal('plantModal', false); 
            plantForm.reset(); 
            document.getElementById('editIndex').value = ''; 
        }
        
        function openEditModal(i) {
            const p = plants[i];
            document.getElementById('modalTitle').innerText = "Edit Plant";
            document.getElementById('editIndex').value = i;
            document.getElementById('plantName').value = p.name;
            updateColorSelection(p.color);
            toggleModal('plantModal', true);
        }

        function deletePlant(i) { 
            if(confirm("Delete plant and all its records?")) { 
                plants.splice(i, 1); 
                saveData(); 
                renderPlants(); 
                renderCalendar(); 
                renderManageList(); 
            } 
        }

        function saveData() { localStorage.setItem('leafy_plants', JSON.stringify(plants)); }

        function handleImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);

                    if (json.length === 0) return showToast("File is empty!");
                    const requiredCols = ["Plant", "Date", "Time"];
                    const headers = Object.keys(json[0]);
                    const missing = requiredCols.filter(c => !headers.includes(c));

                    if (missing.length > 0) return showToast(`Missing: ${missing.join(", ")}`);

                    let importedCount = 0;
                    json.forEach(row => {
                        let plant = plants.find(p => p.name === row.Plant);
                        if (!plant) {
                            const importColor = row.Color && /^#[0-9A-F]{6}$/i.test(row.Color) ? row.Color : defaultPalette[Math.floor(Math.random()*defaultPalette.length)];
                            const newPlant = { name: row.Plant, color: importColor, wateringRecords: [] };
                            plants.push(newPlant);
                            plant = newPlant;
                        }

                        if (!plant.wateringRecords) plant.wateringRecords = [];
                        const existingRecord = plant.wateringRecords.find(r => r.date === row.Date && r.time === row.Time.toLowerCase());
                        
                        if (!existingRecord) {
                            plant.wateringRecords.push({ date: row.Date, time: row.Time.toLowerCase(), note: row.Note || '' });
                            importedCount++;
                        } else if (row.Note && !existingRecord.note) {
                            // Only update note if missing
                            existingRecord.note = row.Note;
                        }
                    });

                    saveData();
                    renderPlants();
                    renderCalendar();
                    showToast(`Imported ${importedCount} records!`);
                    event.target.value = "";
                } catch (err) {
                    showToast("Error reading file.");
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            const data = [];
            plants.forEach(p => {
                if (p.wateringRecords) {
                    p.wateringRecords.forEach(r => {
                        data.push({ Plant: p.name, Date: r.date, Time: r.time, Note: r.note || '', Color: p.color });
                    });
                }
            });
            if (!data.length) return showToast("No data to export!");
            data.sort((a, b) => b.Date.localeCompare(a.Date));
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Watering Records");
            XLSX.writeFile(wb, `LeafyLog_Export_${new Date().toISOString().split('T')[0]}.xlsx`);
        }

        function showToast(m) {
            toastEl.innerText = m;
            toastEl.classList.remove('opacity-0', 'invisible', 'scale-90');
            toastEl.classList.add('opacity-100', 'visible', 'scale-100');
            setTimeout(() => {
                toastEl.classList.remove('opacity-100', 'visible', 'scale-100');
                toastEl.classList.add('opacity-0', 'invisible', 'scale-90');
            }, 2000);
        }

        function renderManageList() {
            manageListEl.innerHTML = '';
            plants.forEach((plant, index) => {
                const div = document.createElement('div');
                div.className = 'flex items-center justify-between p-4 bg-gray-50 rounded-xl border-2 border-transparent cursor-move';
                div.setAttribute('draggable', 'true');
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="w-6 h-6 rounded-full" style="background-color: ${plant.color}"></div>
                        <span class="font-bold">${plant.name}</span>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="openEditModal(${index})" class="text-xl p-1 text-emerald-600 hover:bg-emerald-100 rounded-lg transition-colors">✎</button>
                        <button onclick="deletePlant(${index})" class="text-xl p-1 text-red-400 hover:bg-red-100 rounded-lg transition-colors">✕</button>
                    </div>
                `;
                div.ondragstart = () => { draggedPlantIndex = index; div.classList.add('opacity-50'); };
                div.ondragend = () => { draggedPlantIndex = null; div.classList.remove('opacity-50'); };
                div.ondragover = (e) => e.preventDefault();
                div.ondragenter = () => div.classList.add('border-emerald-500');
                div.ondragleave = () => div.classList.remove('border-emerald-500');
                div.ondrop = (e) => {
                    e.preventDefault();
                    div.classList.remove('border-emerald-500');
                    if (draggedPlantIndex !== null && draggedPlantIndex !== index) reorderPlants(draggedPlantIndex, index);
                };
                manageListEl.appendChild(div);
            });
        }

        function reorderPlants(from, to) {
            const item = plants.splice(from, 1)[0];
            plants.splice(to, 0, item);
            saveData(); renderManageList(); renderPlants(); renderCalendar();
        }

        init();
    </script>
</body>
</html>
